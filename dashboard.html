<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - المطور</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* استايلات خاصة بلوحة التحكم */
        .dashboard {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        
        .login-section {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #ff00c1;
        }
        
        .login-section h2 {
            color: #ff00c1;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,0,193,0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ff00c1;
        }
        
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .server-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,0,193,0.2);
        }
        
        .server-card.vip {
            border: 2px solid gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        
        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .server-name {
            font-size: 1.3em;
            color: #ff00c1;
        }
        
        .server-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        
        .status-active {
            background: #00ff88;
            color: #000;
        }
        
        .status-inactive {
            background: #ff4444;
            color: #fff;
        }
        
        .server-details {
            margin: 15px 0;
        }
        
        .server-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .server-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-small {
            padding: 8px 15px;
            font-size: 0.9em;
            background: rgba(255,0,193,0.2);
            border: 1px solid #ff00c1;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-small:hover {
            background: #ff00c1;
        }
        
        .add-server {
            background: linear-gradient(45deg, #ff00c1, #9600ff);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            margin-bottom: 30px;
        }
        
        .hidden {
            display: none;
        }
        
        .server-password {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            direction: ltr;
            text-align: left;
        }
        
        .copy-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .user-type {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #ff00c1;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="userType" class="user-type">👑 المطور</div>

    <!-- صفحة تسجيل الدخول -->
    <div id="loginPage" class="login-section">
        <h2>🔐 دخول المطور</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" value="fahd.mohmd.1333.9@gmail.com" readonly>
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور">
            </div>
            <button type="submit" class="btn" style="width:100%">دخول</button>
        </form>
    </div>

    <!-- لوحة التحكم الرئيسية (تظهر بعد تسجيل الدخول) -->
    <div id="dashboardPage" class="dashboard hidden">
        <h1>🚀 لوحة تحكم السيرفرات</h1>
        
        <!-- إحصائيات سريعة -->
        <div style="display: grid; grid-template-columns: repeat(4,1fr); gap:20px; margin:30px 0">
            <div style="background:rgba(255,0,193,0.1); padding:20px; border-radius:10px">
                <div style="font-size:2em; color:#ff00c1">5</div>
                <div>إجمالي السيرفرات</div>
            </div>
            <div style="background:rgba(0,255,136,0.1); padding:20px; border-radius:10px">
                <div style="font-size:2em; color:#00ff88">3</div>
                <div>سيرفرات نشطة</div>
            </div>
            <div style="background:rgba(255,255,0,0.1); padding:20px; border-radius:10px">
                <div style="font-size:2em; color:gold">2</div>
                <div>مشتركين VIP</div>
            </div>
            <div style="background:rgba(255,68,68,0.1); padding:20px; border-radius:10px">
                <div style="font-size:2em; color:#ff4444">2</div>
                <div>منتهين</div>
            </div>
        </div>

        <button class="add-server" onclick="showAddServer()">➕ إضافة سيرفر جديد</button>

        <!-- السيرفرات -->
        <h2>📡 السيرفرات النشطة</h2>
        <div id="activeServers" class="servers-grid"></div>

        <h2 style="margin-top:40px">💤 سيرفرات منتهية</h2>
        <div id="expiredServers" class="servers-grid"></div>
    </div>

    <!-- نافذة إضافة سيرفر -->
    <div id="addServerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000">
        <div style="max-width:500px; margin:100px auto; background:#1a1a2e; padding:30px; border-radius:20px">
            <h2 style="color:#ff00c1; margin-bottom:20px">➕ إضافة سيرفر جديد</h2>
            <div class="form-group">
                <label>اسم العميل</label>
                <input type="text" id="clientName" placeholder="اسم العميل">
            </div>
            <div class="form-group">
                <label>يوزر تيليجرام</label>
                <input type="text" id="clientTelegram" placeholder="@username">
            </div>
            <div class="form-group">
                <label>الباقة</label>
                <select id="serverPlan">
                    <option value="mini">Mini Server - 1$</option>
                    <option value="normal">Normal Server - 2.5$</option>
                    <option value="plus">Plus Server - 4.99$</option>
                    <option value="premium">Premium Server - 7$</option>
                    <option value="gold">Gold Server - 10$</option>
                </select>
            </div>
            <div class="form-group">
                <label>كلمة المرور (اتركها فارغة لتوليد عشوائي)</label>
                <input type="text" id="serverPassword" placeholder="كلمة المرور">
            </div>
            <div class="form-group">
                <label>مدة الاشتراك (أيام)</label>
                <input type="number" id="serverDuration" value="30">
            </div>
            <div style="display:flex; gap:10px">
                <button class="btn" onclick="saveServer()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeModal()">❌ إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // كلمة المرور الصحيحة (حقك أنت)
        const MASTER_PASSWORD = "@yekay6";
        
        // بيانات السيرفرات (تخزين محلي)
        let servers = JSON.parse(localStorage.getItem('servers')) || [
            {
                id: 1,
                clientName: 'المطور الأساسي',
                telegram: '@yekay6',
                plan: 'gold',
                ip: '185.215.113.110',
                username: 'root',
                password: '@yekay6',
                expiryDate: '2025-12-31',
                status: 'active',
                isVip: true
            },
            {
                id: 2,
                clientName: 'عميل VIP',
                telegram: '@client1',
                plan: 'premium',
                ip: '185.215.113.111',
                username: 'client1',
                password: 'Kl@12#89',
                expiryDate: '2024-04-15',
                status: 'active',
                isVip: true
            },
            {
                id: 3,
                clientName: 'عميل عادي',
                telegram: '@client2',
                plan: 'normal',
                ip: '185.215.113.112',
                username: 'client2',
                password: 'Nm@78#23',
                expiryDate: '2024-03-01',
                status: 'expired',
                isVip: false
            }
        ];

        // تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            if(password === MASTER_PASSWORD) {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                loadServers();
            } else {
                alert('❌ كلمة المرور غلط');
            }
        });

        // تحميل السيرفرات
        function loadServers() {
            const activeServers = servers.filter(s => s.status === 'active');
            const expiredServers = servers.filter(s => s.status === 'expired');
            
            document.getElementById('activeServers').innerHTML = activeServers.map(serverCard).join('');
            document.getElementById('expiredServers').innerHTML = expiredServers.map(serverCard).join('');
        }

        // بطاقة سيرفر
        function serverCard(server) {
            return `
                <div class="server-card ${server.isVip ? 'vip' : ''}">
                    <div class="server-header">
                        <span class="server-name">${server.clientName}</span>
                        <span class="server-status ${server.status === 'active' ? 'status-active' : 'status-inactive'}">
                            ${server.status === 'active' ? '🟢 نشط' : '🔴 منتهي'}
                        </span>
                    </div>
                    <div class="server-details">
                        <div class="server-detail">
                            <span>تيليجرام:</span>
                            <span>${server.telegram}</span>
                        </div>
                        <div class="server-detail">
                            <span>الباقة:</span>
                            <span>${getPlanName(server.plan)}</span>
                        </div>
                        <div class="server-detail">
                            <span>IP:</span>
                            <span>${server.ip}</span>
                        </div>
                        <div class="server-detail">
                            <span>المستخدم:</span>
                            <span>${server.username}</span>
                        </div>
                        <div class="server-detail">
                            <span>كلمة السر:</span>
                            <span class="server-password">${server.password}</span>
                        </div>
                        <div class="server-detail">
                            <span>تاريخ الانتهاء:</span>
                            <span>${server.expiryDate}</span>
                        </div>
                    </div>
                    <div class="server-actions">
                        <button class="btn-small" onclick="copyServerData(${server.id})">📋 نسخ البيانات</button>
                        <button class="btn-small" onclick="extendServer(${server.id})">⏰ تمديد</button>
                        <button class="btn-small" onclick="deleteServer(${server.id})">🗑️ حذف</button>
                    </div>
                </div>
            `;
        }

        // اسم الباقة
        function getPlanName(plan) {
            const plans = {
                mini: '🌥️ Mini (1$)',
                normal: '⚡ Normal (2.5$)',
                plus: '🚀 Plus (4.99$)',
                premium: '💎 Premium (7$)',
                gold: '👑 Gold (10$)'
            };
            return plans[plan] || plan;
        }

        // نسخ البيانات
        function copyServerData(id) {
            const server = servers.find(s => s.id === id);
            const data = `
IP: ${server.ip}
User: ${server.username}
Pass: ${server.password}
تاريخ الانتهاء: ${server.expiryDate}
            `;
            navigator.clipboard.writeText(data);
            alert('✅ تم نسخ البيانات');
        }

        // تمديد سيرفر
        function extendServer(id) {
            const days = prompt('كم يوم تمديد؟', '30');
            if(days) {
                const server = servers.find(s => s.id === id);
                const currentDate = new Date(server.expiryDate);
                currentDate.setDate(currentDate.getDate() + parseInt(days));
                server.expiryDate = currentDate.toISOString().split('T')[0];
                server.status = 'active';
                localStorage.setItem('servers', JSON.stringify(servers));
                loadServers();
            }
        }

        // حذف سيرفر
        function deleteServer(id) {
            if(confirm('متأكد تحذف السيرفر؟')) {
                servers = servers.filter(s => s.id !== id);
                localStorage.setItem('servers', JSON.stringify(servers));
                loadServers();
            }
        }

        // إظهار نافذة الإضافة
        function showAddServer() {
            document.getElementById('addServerModal').style.display = 'block';
        }

        // إغلاق النافذة
        function closeModal() {
            document.getElementById('addServerModal').style.display = 'none';
        }

        // حفظ سيرفر جديد
        function saveServer() {
            const newServer = {
                id: Date.now(),
                clientName: document.getElementById('clientName').value,
                telegram: document.getElementById('clientTelegram').value,
                plan: document.getElementById('serverPlan').value,
                ip: generateIP(),
                username: 'user' + Math.floor(Math.random()*1000),
                password: document.getElementById('serverPassword').value || generatePassword(),
                expiryDate: getExpiryDate(parseInt(document.getElementById('serverDuration').value)),
                status: 'active',
                isVip: document.getElementById('serverPlan').value === 'premium' || document.getElementById('serverPlan').value === 'gold'
            };
            
            servers.push(newServer);
            localStorage.setItem('servers', JSON.stringify(servers));
            closeModal();
            loadServers();
            alert('✅ تم إضافة السيرفر بنجاح');
        }

        // توليد IP عشوائي
        function generateIP() {
            return `185.215.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
        }

        // توليد كلمة مرور عشوائية
        function generatePassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$';
            let password = '';
            for(let i=0; i<10; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return password;
        }

        // حساب تاريخ الانتهاء
        function getExpiryDate(days) {
            const date = new Date();
            date.setDate(date.getDate() + days);
            return date.toISOString().split('T')[0];
        }
    </script>
</body>
  </html>
